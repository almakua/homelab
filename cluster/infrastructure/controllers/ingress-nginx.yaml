apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx-public
  namespace: ingress-nginx
spec:
  interval: 30m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.10.*"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  values:
    controller:
      ingressClass: nginx-public
      ingressClassResource:
        name: nginx-public
        enabled: true
        default: false
        controllerValue: "k8s.io/ingress-nginx-public"
      service:
        loadBalancerIP: "10.0.20.200"
        annotations:
          metallb.universe.tf/address-pool: public-pool
      config:
        use-forwarded-headers: "true"
        compute-full-forwarded-for: "true"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx-internal
  namespace: ingress-nginx
spec:
  interval: 30m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.10.*"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  values:
    controller:
      ingressClass: nginx-internal
      ingressClassResource:
        name: nginx-internal
        enabled: true
        default: false
        controllerValue: "k8s.io/ingress-nginx-internal"
      service:
        loadBalancerIP: "10.0.20.210"
        annotations:
          metallb.universe.tf/address-pool: internal-pool
