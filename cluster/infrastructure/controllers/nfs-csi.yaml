apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: csi-driver-nfs
      version: "4.8.*"
      sourceRef:
        kind: HelmRepository
        name: nfs-csi
        namespace: flux-system
  values:
    driver:
      mountPermissions: 0755
